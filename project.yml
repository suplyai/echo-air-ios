name: EchoAir

options:
  bundleIdPrefix: app.suply
  createIntermediateGroups: true
  generateEmptyDirectories: true
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: en
  groupSortPosition: top
  xcodeVersion: "15.0"

settings:
  base:
    MARKETING_VERSION: "0.6.1"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CLANG_ENABLE_MODULES: YES
    ALWAYS_SEARCH_USER_PATHS: NO

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig

targets:
  EchoAir:
    type: application
    platform: iOS
    sources:
      - path: EchoAir
        excludes:
          - "Info.plist"
    settings:
      base:
        PRODUCT_NAME: EchoAir
        INFOPLIST_FILE: EchoAir/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
        # CocoaPods' [CP] Copy Pods Resources / Embed Pods Frameworks
        # phases shell out to rsync, which the Xcode 15 sandbox default
        # denies (rsync deny(1) file-write-create at build time).
        # Project-wide default in `settings.base` stays YES; this is the
        # narrowest opt-out for the host target. Mirrored in Podfile's
        # post_install for pod targets — see Podfile.
        ENABLE_USER_SCRIPT_SANDBOXING: NO
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: app.suply.echoair.debug
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: app.suply.echoair

schemes:
  EchoAir:
    build:
      targets:
        EchoAir: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
