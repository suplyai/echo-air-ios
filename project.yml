name: EchoAir

options:
  bundleIdPrefix: app.suply
  createIntermediateGroups: true
  generateEmptyDirectories: true
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: en
  groupSortPosition: top
  xcodeVersion: "15.0"

settings:
  base:
    MARKETING_VERSION: "0.7.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CLANG_ENABLE_MODULES: YES
    ALWAYS_SEARCH_USER_PATHS: NO

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig

targets:
  EchoAir:
    type: application
    platform: iOS
    sources:
      - path: EchoAir
        excludes:
          - "Info.plist"
    settings:
      base:
        PRODUCT_NAME: EchoAir
        INFOPLIST_FILE: EchoAir/Info.plist
        # Automatic signing — Xcode picks the right cert + provisioning
        # profile based on DEVELOPMENT_TEAM and the build operation
        # (development cert for build/run, distribution cert for
        # archive/export). DEVELOPMENT_TEAM is intentionally NOT set
        # here; it flows in from Config/Local.xcconfig (gitignored,
        # per-developer team ID).
        #
        # CODE_SIGN_IDENTITY is also intentionally NOT set — Xcode will
        # error with "conflicting provisioning settings" if you pin it
        # while using automatic signing, because automatic signing
        # wants to choose the identity itself. PROVISIONING_PROFILE_SPECIFIER
        # stays empty so any leftover manual-profile value can't
        # force-disable auto-provisioning.
        CODE_SIGN_STYLE: Automatic
        PROVISIONING_PROFILE_SPECIFIER: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
        # CocoaPods' [CP] Copy Pods Resources / Embed Pods Frameworks
        # phases shell out to rsync, which the Xcode 15 sandbox default
        # denies (rsync deny(1) file-write-create at build time).
        # Project-wide default in `settings.base` stays YES; this is the
        # narrowest opt-out for the host target. Mirrored in Podfile's
        # post_install for pod targets — see Podfile.
        ENABLE_USER_SCRIPT_SANDBOXING: NO
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: app.suply.echoair.debug
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: app.suply.echoair

  EchoAirTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: EchoAirTests
    dependencies:
      - target: EchoAir
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.suply.echoair.tests
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/EchoAir.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/EchoAir
        # Test target inherits ENABLE_USER_SCRIPT_SANDBOXING via TEST_HOST
        # (no Pods script phases of its own).

schemes:
  EchoAir:
    build:
      targets:
        EchoAir: all
        EchoAirTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - EchoAirTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
