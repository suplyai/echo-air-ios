name: EchoAir

options:
  bundleIdPrefix: app.suply
  createIntermediateGroups: true
  generateEmptyDirectories: true
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: en
  groupSortPosition: top
  xcodeVersion: "15.0"

settings:
  base:
    MARKETING_VERSION: "0.7.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CLANG_ENABLE_MODULES: YES
    ALWAYS_SEARCH_USER_PATHS: NO

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig

targets:
  EchoAir:
    type: application
    platform: iOS
    sources:
      - path: EchoAir
        excludes:
          - Info.plist

    settings:
      base:
        PRODUCT_NAME: EchoAir
        DEVELOPMENT_TEAM: VL2Z64A683
        INFOPLIST_FILE: EchoAir/Info.plist

        # ✅ CI SIGNING FIX (IMPORTANT)
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Distribution"

        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: NO
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO

      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: app.suply.echoair.debug

        Release:
          PRODUCT_BUNDLE_IDENTIFIER: app.suply.echoair
          CODE_SIGN_STYLE: Automatic

  EchoAirTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: EchoAirTests

    dependencies:
      - target: EchoAir

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.suply.echoair.tests
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/EchoAir.app/EchoAir
        CODE_SIGN_STYLE: Automatic

schemes:
  EchoAir:
    build:
      targets:
        EchoAir: all
        EchoAirTests: [test]

    run:
      config: Debug

    test:
      config: Debug
      targets:
        - EchoAirTests

    archive:
      config: Release