name: EchoAir

options:
  bundleIdPrefix: app.suply
  createIntermediateGroups: true
  generateEmptyDirectories: true
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: en
  groupSortPosition: top
  xcodeVersion: "15.0"

settings:
  base:
    MARKETING_VERSION: "0.7.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CLANG_ENABLE_MODULES: YES
    ALWAYS_SEARCH_USER_PATHS: NO

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig

targets:
  EchoAir:
    type: application
    platform: iOS
    sources:
      - path: EchoAir
        excludes:
          - "Info.plist"
    settings:
      base:
        PRODUCT_NAME: EchoAir
        INFOPLIST_FILE: EchoAir/Info.plist
        # Fully manual signing — both configs. Xcode's automatic flow
        # was repeatedly failing during archive pre-flight because it
        # tries to provision a Development profile (needs registered
        # devices) alongside the Distribution profile, even when the
        # invoked operation is Archive. Going fully manual makes signing
        # deterministic: no auto flow to fail on.
        #
        # DEVELOPMENT_TEAM intentionally NOT set here — flows in from
        # Config/Local.xcconfig (gitignored, per-developer team ID).
        # Currently VL2Z64A683 in Barry's checkout.
        #
        # Per-config:
        #   • Release pins CODE_SIGN_IDENTITY + PROVISIONING_PROFILE_SPECIFIER
        #     to the App Store distribution profile created at
        #     developer.apple.com (profile name "EchoAir App Store",
        #     cert "Apple Distribution" issued to Barry Rollins).
        #   • Debug leaves PROVISIONING_PROFILE_SPECIFIER blank — simulator
        #     builds use ad-hoc signing via the iphonesimulator SDK variant
        #     and don't need a profile. Debug-on-device would need a
        #     Development profile (blocked on device registration, deferred
        #     until USB works).
        CODE_SIGN_STYLE: Manual
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
        # CocoaPods' [CP] Copy Pods Resources / Embed Pods Frameworks
        # phases shell out to rsync, which the Xcode 15 sandbox default
        # denies (rsync deny(1) file-write-create at build time).
        # Project-wide default in `settings.base` stays YES; this is the
        # narrowest opt-out for the host target. Mirrored in Podfile's
        # post_install for pod targets — see Podfile.
        ENABLE_USER_SCRIPT_SANDBOXING: NO
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: app.suply.echoair.debug
          PROVISIONING_PROFILE_SPECIFIER: ""
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: app.suply.echoair
          CODE_SIGN_IDENTITY: "Apple Distribution"
          "CODE_SIGN_IDENTITY[sdk=iphoneos*]": "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "EchoAir App Store"

  EchoAirTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: EchoAirTests
    dependencies:
      - target: EchoAir
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.suply.echoair.tests
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/EchoAir.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/EchoAir
        # Test target inherits ENABLE_USER_SCRIPT_SANDBOXING via TEST_HOST
        # (no Pods script phases of its own).

schemes:
  EchoAir:
    build:
      targets:
        EchoAir: all
        EchoAirTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - EchoAirTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
