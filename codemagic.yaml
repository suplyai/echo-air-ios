workflows:
  ios-testflight:
    name: iOS TestFlight Build

    environment:
      xcode: latest

      vars:
        XCODE_WORKSPACE: "EchoAir.xcworkspace"
        XCODE_SCHEME: "EchoAir"
        BUNDLE_ID: "app.suply.echoair"

      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.suply.echoair

      groups:
        - app_store_credentials

    integrations:
      app_store_connect: Github

    scripts:

      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode Project
        script: |
          xcodegen generate

      - name: Clean CocoaPods
        script: |
          rm -rf Pods Podfile.lock
          rm -rf ~/Library/Developer/Xcode/DerivedData

      - name: Install CocoaPods
        script: |
          pod install --repo-update

      - name: Verify workspace exists
        script: |
          ls -la EchoAir.xcworkspace

      - name: Build IPA
        script: |
          mkdir -p /tmp/xcodebuild_logs
          ARCHIVE_PATH="/Users/builder/clone/build/ios/xcarchive/EchoAir.xcarchive"
          EXPORT_PATH="/Users/builder/clone/build/ios/ipa"
          mkdir -p "$EXPORT_PATH"

          echo "=== Archiving ==="
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -config Release \
            -archivePath "$ARCHIVE_PATH" \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=VL2Z64A683 \
            archive \
            2>&1 | tee /tmp/xcodebuild_logs/archive.log

          echo "=== Archive log (last 50 lines) ==="
          tail -50 /tmp/xcodebuild_logs/archive.log

          echo "=== Archive exists? ==="
          ls -la /Users/builder/clone/build/ios/xcarchive/ || echo "Directory empty or missing"

          echo "=== Exporting IPA ==="
          cat > /tmp/export_options.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>VL2Z64A683</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>uploadSymbols</key>
            <true/>
            <key>destination</key>
            <string>export</string>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist /tmp/export_options.plist \
            -allowProvisioningUpdates \
            2>&1 | tee /tmp/xcodebuild_logs/export.log
            
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false