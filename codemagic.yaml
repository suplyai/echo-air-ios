workflows:
  ios-testflight:
    name: iOS TestFlight Build

    environment:
      xcode: latest

      vars:
        XCODE_WORKSPACE: "EchoAir.xcworkspace"
        XCODE_SCHEME: "EchoAir"
        BUNDLE_ID: "app.suply.echoair"

      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.suply.echoair

      groups:
        - app_store_credentials

    integrations:
      app_store_connect: Github

    scripts:

      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode Project
        script: |
          xcodegen generate

      - name: Clean CocoaPods
        script: |
          rm -rf Pods Podfile.lock
          rm -rf ~/Library/Developer/Xcode/DerivedData

      - name: Install CocoaPods
        script: |
          pod install --repo-update

      - name: Verify workspace exists
        script: |
          ls -la
          ls -la EchoAir.xcworkspace

      - name: Create Export Options
        script: |
          cat > /Users/builder/export_options.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>VL2Z64A683</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>app.suply.echoair</key>
              <string>match AppStore app.suply.echoair</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
            <key>destination</key>
            <string>upload</string>
          </dict>
          </plist>
          EOF

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --config Release \
            --export-options-plist /Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false