workflows:
  ios-testflight:
    name: iOS TestFlight Build

    environment:
      xcode: latest

      vars:
        XCODE_WORKSPACE: "EchoAir.xcworkspace"
        XCODE_SCHEME: "EchoAir"
        BUNDLE_ID: "app.suply.echoair"

      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.suply.echoair

      groups:
        - app_store_credentials

    integrations:
      app_store_connect: Github

    scripts:

      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Set build number
        script: |
          LATEST=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" 2>/dev/null || echo "0")
          NEW=$((LATEST + 1))
          echo "Setting build number to $NEW"
          sed -i "s/CURRENT_PROJECT_VERSION: .*/CURRENT_PROJECT_VERSION: \"$NEW\"/" project.yml

      - name: Generate Xcode Project
        script: |
          xcodegen generate

      - name: Clean CocoaPods
        script: |
          rm -rf Pods Podfile.lock
          rm -rf ~/Library/Developer/Xcode/DerivedData

      - name: Install CocoaPods
        script: |
          pod install --repo-update

      - name: Verify workspace exists
        script: |
          ls -la EchoAir.xcworkspace

      - name: Apply signing profiles
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          mkdir -p /tmp/xcodebuild_logs
          ARCHIVE_PATH="/Users/builder/clone/build/ios/xcarchive/EchoAir.xcarchive"
          EXPORT_PATH="/Users/builder/clone/build/ios/ipa"
          mkdir -p "$EXPORT_PATH"

          echo "=== Archiving ==="
          set -o pipefail
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -config Release \
            -archivePath "$ARCHIVE_PATH" \
            DEVELOPMENT_TEAM=VL2Z64A683 \
            archive \
            2>&1 | tee /tmp/xcodebuild_logs/archive.log

          echo "=== Exporting IPA ==="
          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist /Users/builder/export_options.plist \
            2>&1 | tee /tmp/xcodebuild_logs/export.log

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false